name: 🌥️ Build Nimbus APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗂️ Reorganize flat files into project structure
        run: |
          python3 - <<'EOF'
          import os, shutil
          for fname in os.listdir('.'):
              if '__' in fname and os.path.isfile(fname):
                  target = fname.replace('__', '/')
                  os.makedirs(os.path.dirname(target), exist_ok=True)
                  shutil.move(fname, target)
                  print(f"✓ {fname} → {target}")
          EOF
          echo "--- Final structure ---"
          find . -type f | grep -v '.git/' | sort

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: 🔧 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗️ Build Debug APK
        run: gradle assembleDebug --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
