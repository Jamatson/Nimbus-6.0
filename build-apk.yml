name: 🌥️ Build Nimbus APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗂️ Reorganize flat files into project structure
        run: |
          echo "Reorganizing files..."
          find . -maxdepth 1 -name '*__*' | while read flatfile; do
            filename="${flatfile#./}"
            target_path="${filename//__//}"
            mkdir -p "$(dirname "$target_path")"
            mv "$filename" "$target_path"
            echo "  ✓ $filename → $target_path"
          done
          echo "Done! Structure:"
          find . -type f | grep -v '.git/' | sort

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: 🔧 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗️ Build Debug APK
        run: gradle assembleDebug --stacktrace --info 2>&1 | tail -100
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Summary
        run: |
          echo "## 🌥️ Nimbus APK Built!" >> $GITHUB_STEP_SUMMARY
          echo "Download **nimbus-debug-apk** from Artifacts below." >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "📦 Size: \`$APK_SIZE\`" >> $GITHUB_STEP_SUMMARY
